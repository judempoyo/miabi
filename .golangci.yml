# golangci-lint v2 configuration.
# The default "standard" set is used: errcheck, govet, ineffassign, staticcheck,
# unused. We keep the bug-catching staticcheck (SA*) and simplifications (S*),
# and only silence advisory noise so a green run means "no real issues".
version: "2"

linters:
  settings:
    staticcheck:
      checks:
        - all
        # The ST* stylecheck naming/comment conventions are disabled by default
        # (kept off here — they are opinionated style, not correctness).
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
        # SA1019 (use of deprecated APIs) is tracked and migrated on its own
        # schedule; a deprecation is not a CI-blocking defect.
        - -SA1019
        # QF* are "quickfix" style suggestions (auto-fixable refactors), not bugs.
        - -QF1001
        - -QF1008
        - -QF1012
  exclusions:
    rules:
      # Ignored Close()/cleanup return values in tests are intentional.
      - path: _test\.go
        linters:
          - errcheck
