# Posta — self-hosted transactional email & SMTP platform — deployed as a single
# miabi.io/v1 Project: a managed PostgreSQL database, a dedicated Redis, the
# Posta server (HTTP API + web UI, embedded worker), and a public HTTPS route
# with automatic TLS.
#
# This mirrors the Posta marketplace template (templates/posta) but as a
# declarative bundle you apply directly or reconcile from Git:
#   POST /api/v1/workspaces/{ws}/apply
#   { "manifests": "<this file>", "dry_run": true }   # preview the plan
#   { "manifests": "<this file>" }                     # converge the workspace
#
# Env interpolation available in apply/GitOps:
#   {{ .databases.<name>.host | port | user | password | name | uri }}
# (The {{ .inputs.* }} and {{ .secrets.* }} helpers are marketplace-only. Here,
# keys that must stay private are listed under secretEnv so Miabi stores them
# encrypted at rest — set strong values before applying.)
apiVersion: miabi.io/v1
kind: Project
metadata:
  name: posta
spec:
  description: Self-hosted transactional email platform (Posta) — Postgres, Redis, server and route.
  resources:
    # Managed PostgreSQL — Posta's primary datastore.
    - apiVersion: miabi.io/v1
      kind: Database
      metadata: { name: posta-db }
      spec:
        engine: postgres
        version: "17-alpine"
        placement: auto          # auto | dedicated | shared

    # Dedicated Redis — async job queue (asynq) + caches. Miabi sets a
    # password on the instance, surfaced below as .databases.posta-redis.password.
    - apiVersion: miabi.io/v1
      kind: Database
      metadata: { name: posta-redis }
      spec:
        engine: redis
        version: "8-alpine"
        placement: dedicated

    # The Posta server: HTTP API + web UI on :9000 with the worker embedded.
    - apiVersion: miabi.io/v1
      kind: Application
      metadata: { name: posta }
      spec:
        image: jkaninda/posta
        tag: "0.11.0"
        ports:
          - container: 9000
            scheme: http
        env:
          POSTA_ENV: production
          POSTA_WEB_URL: "https://posta.example.com"   # must match the route host below

          # Database — resolved from the managed posta-db instance.
          POSTA_DB_HOST: "{{ .databases.posta-db.host }}"
          POSTA_DB_PORT: "{{ .databases.posta-db.port }}"
          POSTA_DB_USER: "{{ .databases.posta-db.user }}"
          POSTA_DB_PASSWORD: "{{ .databases.posta-db.password }}"
          POSTA_DB_NAME: "{{ .databases.posta-db.name }}"

          # Redis — host:port + password from the dedicated instance.
          POSTA_REDIS_ADDR: "{{ .databases.posta-redis.host }}:{{ .databases.posta-redis.port }}"
          POSTA_REDIS_PASSWORD: "{{ .databases.posta-redis.password }}"

          # Security — CHANGE THESE before applying. Stored encrypted (secretEnv).
          # (The marketplace template auto-generates jwt_secret/encryption_key for you.)
          POSTA_JWT_SECRET: "change-me-to-a-long-random-string"
          POSTA_ENCRYPTION_KEY: "change-me-to-a-32-byte-secret!!!"   # AES-256-GCM: exactly 32 bytes
          POSTA_ADMIN_EMAIL: admin@example.com
          POSTA_ADMIN_PASSWORD: "change-me"

          # Worker runs inside the server process (no separate worker container).
          POSTA_EMBEDDED_WORKER: "true"
          POSTA_WORKER_CONCURRENCY: "10"
          POSTA_WORKER_MAX_RETRIES: "5"

          # Email-verification endpoint (results cached in Redis).
          POSTA_EMAIL_VERIFY_ENABLED: "true"
          POSTA_EMAIL_VERIFY_CACHE_TTL_HOURS: "168"
          POSTA_EMAIL_VERIFY_MX_CACHE_TTL_HOURS: "24"
          POSTA_EMAIL_VERIFY_RATE_HOURLY: "1000"
        secretEnv:
          - POSTA_DB_PASSWORD
          - POSTA_REDIS_PASSWORD
          - POSTA_JWT_SECRET
          - POSTA_ENCRYPTION_KEY
          - POSTA_ADMIN_PASSWORD
        resources:
          memory: 512Mi
          cpu: "1"

        # ── Optional: receive inbound email ──────────────────────────────────
        # Posta ships a built-in SMTP receiver. To accept inbound mail, add to
        # env:   POSTA_INBOUND_ENABLED: "true"
        #        POSTA_INBOUND_HOSTNAME: posta.example.com   # must match your MX record
        # and publish the receiver on the node's port 25 by adding a second port:
        #   - container: 2525
        #     protocol: tcp
        #     publish: true
        #     hostPort: 25

    # The hostname Posta is served on (ownership + default TLS policy). DNS
    # verification is a runtime action after apply.
    - apiVersion: miabi.io/v1
      kind: Domain
      metadata: { name: posta.example.com }
      spec:
        tls: acme                # acme | custom

    # Public HTTPS route for the web UI / API, with automatic Let's Encrypt TLS.
    - apiVersion: miabi.io/v1
      kind: Route
      metadata: { name: posta-web }
      spec:
        hosts: [posta.example.com]
        app: posta
        port: 9000
        tls: acme                # acme | custom | off
